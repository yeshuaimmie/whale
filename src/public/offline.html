<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - The Whale Investors</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f4f8ff 0%, #e9f8ec 100%);
      color: #1f2937;
      padding: 1.2rem;
    }

    .card {
      width: min(100%, 480px);
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      padding: 1.25rem;
      text-align: center;
    }

    h1 {
      margin-top: 0;
      font-size: 1.4rem;
    }

    p {
      color: #4b5563;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>You are offline</h1>
    <p>The Whale Investors app is not connected right now. Please check your network and try again.</p>
  </div>
</body>
</html>
